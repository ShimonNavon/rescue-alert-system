services:
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    container_name: rescue_alert_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rescue_alert
      POSTGRES_USER: rescue_user
      POSTGRES_PASSWORD: change_me_now
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rescue_user -d rescue_alert"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rescue_alert_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: