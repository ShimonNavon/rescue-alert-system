<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Get Firebase Token</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; margin-bottom: 24px; }
    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: white;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .btn-google:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .btn-google svg { width: 20px; height: 20px; }
    .token-section { display: none; text-align: left; }
    .token-section h2 { font-size: 15px; color: #333; margin-bottom: 8px; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding: 12px;
      background: #f0fdf4;
      border-radius: 8px;
    }
    .user-info img { width: 40px; height: 40px; border-radius: 50%; }
    .user-info .name { font-weight: 600; font-size: 14px; }
    .user-info .email { font-size: 13px; color: #666; }
    textarea {
      width: 100%;
      height: 120px;
      font-family: monospace;
      font-size: 11px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: none;
      color: #333;
      background: #fafafa;
      margin-bottom: 12px;
    }
    .btn-copy {
      width: 100%;
      padding: 12px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: #1557b0; }
    .btn-copy.copied { background: #188038; }
    .expiry {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
    }
    .btn-signout {
      margin-top: 16px;
      background: none;
      border: none;
      color: #999;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }
    .error { color: #d93025; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="login-section">
      <h1>Rescue Alert — Get API Token</h1>
      <p>Sign in with your Google account to get a Firebase ID token for Postman.</p>
      <button class="btn-google" onclick="signIn()">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        Sign in with Google
      </button>
      <div class="error" id="error-msg"></div>
    </div>

    <div class="token-section" id="token-section">
      <div class="user-info" id="user-info"></div>
      <h2>Your Firebase Token — paste into Postman <code>firebase_token</code></h2>
      <textarea id="token-box" readonly></textarea>
      <button class="btn-copy" id="copy-btn" onclick="copyToken()">Copy Token</button>
      <div class="expiry" id="expiry"></div>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const app = initializeApp({
      apiKey: "AIzaSyDKVqBWCnBqz2xmebtiD-6VOEHkT4z_zMc",
      authDomain: "rescue-alert-prod-12345.firebaseapp.com",
      projectId: "rescue-alert-prod-12345",
      storageBucket: "rescue-alert-prod-12345.firebasestorage.app",
      messagingSenderId: "631985219642",
      appId: "1:631985219642:web:92e47bd81872c938986d03"
    });

    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.signIn = async () => {
      try {
        document.getElementById('error-msg').textContent = '';
        await signInWithPopup(auth, provider);
      } catch (e) {
        document.getElementById('error-msg').textContent = e.message;
      }
    };

    window.signOut = async () => {
      await fbSignOut(auth);
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('token-section').style.display = 'none';
    };

    window.copyToken = () => {
      navigator.clipboard.writeText(document.getElementById('token-box').value);
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Token'; btn.classList.remove('copied'); }, 2000);
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const token = await user.getIdToken();
        const expiry = new Date(Date.now() + 3600000);

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('token-section').style.display = 'block';
        document.getElementById('token-box').value = token;
        document.getElementById('expiry').textContent = `Expires at ${expiry.toLocaleTimeString()}`;
        document.getElementById('user-info').innerHTML = `
          ${user.photoURL ? `<img src="${user.photoURL}" alt="">` : ''}
          <div><div class="name">${user.displayName || ''}</div><div class="email">${user.email}</div></div>
        `;
      }
    });
  </script>
</body>
</html>
